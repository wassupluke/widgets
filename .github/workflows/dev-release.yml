name: Dev Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Publish Dev Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Rename APK
        id: rename_apk
        run: |
          RENAMED="simple-weather-dev.apk"
          mv "${{ steps.sign_app.outputs.signedReleaseFile }}" "$RENAMED"
          echo "apk_path=$RENAMED" >> $GITHUB_OUTPUT

      - name: Update dev tag
        run: |
          git tag -f dev
          git push --force origin dev

      - name: Create or update dev release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename_apk.outputs.apk_path }}
          name: Dev Build
          tag_name: dev
          body: |
            Latest signed build from `main`.

            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message }}
          draft: false
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
