name: Publish Pre-release

on:
  push:
    branches:
      - main

jobs:
  prerelease:
    name: Build and Pre-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Compute tag name
        id: tag
        run: echo "name=nightly-$(date -u +'%Y%m%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Rename APK
        id: rename_apk
        run: |
          RENAMED="simple-weather-${{ steps.tag.outputs.name }}.apk"
          mv "${{ steps.sign_app.outputs.signedReleaseFile }}" "$RENAMED"
          echo "apk_path=$RENAMED" >> $GITHUB_OUTPUT

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename_apk.outputs.apk_path }}
          name: Nightly ${{ steps.tag.outputs.name }}
          tag_name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
